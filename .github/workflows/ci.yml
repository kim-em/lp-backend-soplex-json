name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    name: Build (no native deps)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      # SoPlex is a *runtime* dep of this package (the JSON backend
      # spawns it via IO.Process when invoked), not a build dep. The
      # build graph here is pure Lean; if anything links GMP, Boost,
      # or SoPlex we want to know.
      - run: lean --version
      - run: lake build
      # Encoder/decoder round-trip tests. No `soplex` binary required;
      # an integration test that actually spawns one would need an
      # extra matrix entry that `apt install soplex` / `brew install
      # soplex` first.
      - run: lake test
